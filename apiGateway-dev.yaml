spring:
  r2dbc:
    url: r2dbc:mysql://thomas.proxy.rlwy.net:40415/bankguard_auth
    username: root
    password: ${MYSQL_PASSWORD}
  cloud:
    gateway:
      enabled: true
      discovery:
        locator:
          enabled: false
      # ✅ CORS HANDLED HERE (at gateway level)
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "https://bank-gaurd-frontend.vercel.app"
              - "https://bank-gaurd-customer-frontend.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: transaction-service
          uri: lb://transactionService
          predicates:
            - Path=/api/transactions/**
        - id: customer-service
          uri: lb://transactionService
          predicates:
            - Path=/api/customers/**
        - id: enrichment-service
          uri: lb://enrichmentService
          predicates:
            - Path=/api/enrich/**
        - id: decision-engine-service
          uri: lb://decision-engine
          predicates:
            - Path=/api/gemini/**
        - id: alertcase-service
          uri: lb://alert-case-service
          predicates:
            - Path=/api/investigation/**
        - id: sar-service
          uri: lb://sarReport
          predicates:
            - Path=/sar/**

eureka:
  client:
    service-url:
      defaultZone: https://eureka-server-ku09.onrender.com/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

jwt:
  secret: BankGuardSuperSecretKeyForJWT2025ThisMustBeLongEnoughForHS256Algorithm
  expiration: 86400000

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: INFO

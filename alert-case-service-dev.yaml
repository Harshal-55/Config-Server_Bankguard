spring:
  datasource:
    url: jdbc:mysql://thomas.proxy.rlwy.net:40415/alert_case_db?createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: https://eureka-server-ku09.onrender.com/eureka/
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: true

external:
  reporting-service:
    url: lb://sarReport/sar/ingest-report

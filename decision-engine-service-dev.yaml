spring:
  datasource:
    url: jdbc:mysql://thomas.proxy.rlwy.net:40415/decision_db
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: https://eureka-server-ku09.onrender.com/eureka/
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: true

logging:
  level:
    root: INFO
    com.cts.gemini_test_try2: DEBUG

google:
  api:
    key: ${GOOGLE_API_KEY}

spring:
  datasource:
    url: jdbc:mysql://thomas.proxy.rlwy.net:40415/bankguard_db?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: https://eureka-server-ku09.onrender.com/eureka/
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: true

enrichment:
  service:
    url: lb://enrichmentService

logging:
  level:
    root: INFO
    com.bankguard.transactionservice: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

  info:
    env:
      enabled: true

  endpoint:
    health:
      show-details: always

info:
  app:
    name: Transaction Service
    description: Used To initiate the transaction
    version: 1.0.0
